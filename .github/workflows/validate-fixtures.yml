name: Validate fixtures

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-fixtures:
    name: Validate schemas and fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile validator
        run: python -m py_compile tools/validate_fixtures.py

      - name: Validate schemas and fixtures
        run: python tools/validate_fixtures.py
